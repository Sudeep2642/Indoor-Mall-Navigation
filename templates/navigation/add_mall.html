{% extends 'navigation/base.html' %}
{% block title %}Add Mall{% endblock %}
{% block content %}
<div class="container page" style="max-width:640px">
  <h1 style="font-size:1.5rem;font-weight:800;margin-bottom:.4rem">🏬 Add New Mall</h1>
  <p style="color:var(--muted);font-size:.875rem;margin-bottom:1.5rem">Each mall is independent — own floors, locations, QR codes, and analytics.</p>
  <div class="card">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
        <div class="form-group" style="grid-column:1/-1">
          <label>Mall Name *</label>
          <input type="text" name="name" class="form-control" placeholder="e.g. Orion Mall" required>
        </div>
        <div class="form-group">
          <label>URL Slug *</label>
          <input type="text" name="slug" id="slug" class="form-control" placeholder="e.g. orion-bangalore" required>
          <small style="color:var(--muted);font-size:.72rem">lowercase, hyphens only — used in URLs & QR codes</small>
        </div>
        <div class="form-group">
          <label>City *</label>
          <input type="text" name="city" class="form-control" placeholder="Bangalore" required>
        </div>
        <div class="form-group" style="grid-column:1/-1">
          <label>Address</label>
          <textarea name="address" class="form-control" rows="2" placeholder="Full address"></textarea>
        </div>
        <div class="form-group">
          <label>Total Floors</label>
          <input type="number" name="total_floors" class="form-control" value="3" min="1" max="20">
        </div>
        <div class="form-group">
          <label>Logo</label>
          <input type="file" name="logo" class="form-control" accept="image/*">
        </div>
      </div>
      <div style="display:flex;gap:.75rem;margin-top:.5rem">
        <button type="submit" class="btn btn-primary">Create Mall</button>
        <a href="/dashboard/" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
<script>
document.querySelector('[name=name]').addEventListener('input',function(){
  document.getElementById('slug').value=this.value.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
});
</script>
{% endblock %}
