{% extends 'navigation/base.html' %}
{% block title %}Login — MallNav{% endblock %}
{% block content %}
<div style="min-height:calc(100vh - 56px);display:flex;align-items:center;justify-content:center;padding:2rem">
  <div style="width:100%;max-width:380px">
    <div style="text-align:center;margin-bottom:2rem">
      <div style="font-size:2.5rem;margin-bottom:.75rem">🏬</div>
      <h1 style="font-size:1.5rem;font-weight:800;margin-bottom:.4rem">MallNav Admin</h1>
      <p style="color:var(--muted);font-size:.875rem">Sign in to manage your malls</p>
    </div>
    <div class="card">
      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" class="form-control" placeholder="admin" autofocus required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:.75rem">Sign In</button>
      </form>
    </div>
    <p style="text-align:center;margin-top:1.25rem;font-size:.8rem;color:var(--muted)">
      Default: <code style="background:var(--card);padding:.15rem .4rem;border-radius:4px">admin / admin123</code>
    </p>
  </div>
</div>
{% endblock %}
