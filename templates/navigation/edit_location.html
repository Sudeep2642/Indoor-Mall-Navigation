{% extends 'navigation/base.html' %}
{% block title %}Edit {{ loc.name }}{% endblock %}
{% block content %}
<div class="container page" style="max-width:640px">
  <div style="font-size:.8rem;color:var(--muted);margin-bottom:.5rem"><a href="/dashboard/{{ mall.slug }}/">{{ mall.name }}</a> › Edit Location</div>
  <h1 style="font-size:1.5rem;font-weight:800;margin-bottom:1.5rem">Edit: {{ loc.name }}</h1>
  <div class="card">
    <form method="post">
      {% csrf_token %}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
        <div class="form-group" style="grid-column:1/-1">
          <label>Location Name</label>
          <input type="text" name="name" class="form-control" value="{{ loc.name }}" required>
        </div>
        <div class="form-group">
          <label>Type</label>
          <select name="loc_type" class="form-control">
            {% for val,label in type_choices %}<option value="{{ val }}" {% if val == loc.loc_type %}selected{% endif %}>{{ label }}</option>{% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Floor</label>
          <select name="floor_id" class="form-control">
            {% for fl in floors %}<option value="{{ fl.id }}" {% if fl.id == loc.floor_id %}selected{% endif %}>{{ fl.label }}</option>{% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>X %</label>
          <input type="number" name="x_pct" class="form-control" value="{{ loc.x_pct }}" min="0" max="100" step="0.5">
        </div>
        <div class="form-group">
          <label>Y %</label>
          <input type="number" name="y_pct" class="form-control" value="{{ loc.y_pct }}" min="0" max="100" step="0.5">
        </div>
        <div class="form-group" style="grid-column:1/-1">
          <label>Description</label>
          <textarea name="description" class="form-control" rows="2">{{ loc.description }}</textarea>
        </div>
      </div>
      <div style="display:flex;gap:.75rem;margin-top:.5rem">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="/dashboard/{{ mall.slug }}/" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
